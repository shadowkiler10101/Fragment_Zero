<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fragment Zero</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
}

canvas {
    display: block;
}

.hud {
    position: absolute;
    width: 100%;
    text-align: center;
    color: #ff3c3c;
    pointer-events: none;
}

.top {
    top: 10px;
}

.bottom {
    bottom: 10px;
    font-size: 12px;
    color: #555;
}
</style>
</head>

<body>

<div class="hud top">
    <h1>FRAGMENT ZERO</h1>
</div>

<div class="hud bottom">
    [W,A,S,D] MOVE | [CLICK] SHOOT
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
let player = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    size: 40,
    speed: 6
};

// INPUT
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// BULLETS
let bullets = [];
let canShoot = true;

window.addEventListener("click", () => {
    if (!canShoot) return;

    bullets.push({
        x: player.x,
        y: player.y
    });

    canShoot = false;
    setTimeout(() => canShoot = true, 200);
});

// ENEMIES
let enemies = [];

function spawnEnemy() {
    enemies.push({
        x: Math.random() * canvas.width,
        y: -20,
        size: 30,
        speed: 2 + Math.random() * 2
    });
}

setInterval(spawnEnemy, 1000);

// GAME LOOP
function update() {

    // MOVE PLAYER
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;
    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;

    // LIMIT
    player.x = Math.max(0, Math.min(canvas.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height, player.y));

    // MOVE BULLETS
    bullets.forEach((b, i) => {
        b.y -= 10;
        if (b.y < 0) bullets.splice(i, 1);
    });

    // MOVE ENEMIES
    enemies.forEach((e, ei) => {
        e.y += e.speed;

        // COLLISION
        bullets.forEach((b, bi) => {
            if (
                b.x < e.x + e.size &&
                b.x > e.x - e.size &&
                b.y < e.y + e.size &&
                b.y > e.y - e.size
            ) {
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
            }
        });

        // REMOVE IF OFFSCREEN
        if (e.y > canvas.height) enemies.splice(ei, 1);
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // PLAYER
    ctx.fillStyle = "white";
    ctx.fillRect(player.x - 20, player.y - 20, player.size, player.size);

    // BULLETS
    ctx.fillStyle = "red";
    bullets.forEach(b => {
        ctx.fillRect(b.x - 2, b.y - 10, 4, 10);
    });

    // ENEMIES
    ctx.fillStyle = "lime";
    enemies.forEach(e => {
        ctx.fillRect(e.x - 15, e.y - 15, e.size, e.size);
    });
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
