<html lang="en-us"><script src="https://pygame-web.github.io/cdn/0.9.3/pythons.js" type=module id="site" data-python="python3.12" data-LINES=42 data-COLUMNS=132 data-os="vtx,snd,gui" async defer>#</script><head>
<script type="application/javascript">
// END BLOCK

config = {
    xtermjs : "1" ,
    _sdl2 : "canvas",
    user_canvas : 0,
    user_canvas_managed : 0,
    gui_divider : 2,
    ume_block : 1,
    can_close : 0,
    archive : "fragment_zero",
    gui_debug : 2,
    cdn : "https://pygame-web.github.io/cdn/0.9.3/",
    autorun : 0,
    PYBUILD : "3.12",
    fb_ar   :  1.77,
    fb_width : "1280",
    fb_height : "720"
}

function show_infobox() {
    infobox.style.display = "block";
    const w = infobox.offsetWidth;
    const h = infobox.offsetHeight;
    const left = (window.innerWidth - w) / 2;
    const top = (window.innerHeight - h) / 2;
    infobox.style.left = left + "px";
    infobox.style.top = top + "px";
}

</script>

    <title>Fragment Zero | Shinigami Osama</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="icon" type="image/png" href="favicon.png" sizes="16x16">

    <style>
        body {
            background-color: #000;
            color: #ff3c3c;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        #canvas {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain;
            image-rendering: pixelated;
            z-index: 1;
        }

        /* Tactical HUD Overlays */
        .hud-top {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 3px;
        }

        .hud-bottom {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            font-size: 12px;
            color: #666;
        }

        .hud-side {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            z-index: 10;
            pointer-events: none;
            color: rgba(255, 60, 60, 0.6);
        }

        #infobox {
            position: fixed;
            background: #000;
            color: #ff3c3c;
            border: 2px solid #ff3c3c;
            box-shadow: 0 0 15px #ff3c3c;
            font-weight: bold;
            padding: 15px 30px;
            z-index: 999999;
            text-transform: uppercase;
        }

        #status {
            color: #ff3c3c;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        #progress {
            accent-color: #ff3c3c;
            width: 250px;
            height: 4px;
        }

        #transfer {
            position: absolute;
            z-index: 20;
            text-align: center;
        }

        canvas.emscripten {
            border: 0px none;
            background-color: transparent;
            padding: 0;
            margin: 0;
        }
    </style>

    <script src="https://pygame-web.github.io/cdn/0.9.3//browserfs.min.js"></script>
</head>

<body>

    <div class="hud-top">
        <h1 style="margin:0; font-size: 24px;">FRAGMENT_ZERO</h1>
        <div style="font-size: 10px; color: #ff3c3c;">ARCHITECT: SHINIGAMI_OSAMA</div>
    </div>

    <div class="hud-side" style="left: 20px;">
        <p>STATUS: UNSTABLE</p>
        <p>LINK: ESTABLISHED</p>
        <p>SECTOR: 06</p>
    </div>

    <div class="hud-side" style="right: 20px; text-align: right;">
        <p>PARASITE_ID: PP-Ω06</p>
        <p>COGNITION: REDACTED</p>
        <p>VRS: 0.9.3</p>
    </div>

    <div class="hud-bottom">
        [W,A,S,D] MOVE | [L-CLICK] FIRE | [R-CLICK] MELEE | [Q] SWAP
    </div>

    <div id="transfer">
        <div class="emscripten" id="status">SYST_INIT...</div>
        <div class="emscripten">
            <progress value="0" max="100" id="progress"></progress>
        </div>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=1></canvas>

    <div id="infobox">INITIALIZING NEURAL LINK...</div>

    <script type="application/javascript">
        async function custom_onload(debug_hidden) {
            pyconsole.hidden = debug_hidden;
            transfer.hidden = debug_hidden;
            show_infobox();
        }
    </script>
</body>
</html>
